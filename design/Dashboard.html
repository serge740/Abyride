<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abyride · Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #ffffff;
    --bg-2:      #f6f7f9;
    --bg-3:      #eef0f3;
    --ink:       #0b1f3a;
    --ink-soft:  #4b5b75;
    --mute:      #8a8d96;
    --rule:      #e6e7eb;
    --cobalt:    #1e3a8a;
    --cobalt-hi: #2546b8;
    --break-bg:     #0b1f3a;
    --break-bg-2:   #06152b;
    --break-fg:     #ffffff;
    --break-mute:   rgba(255,255,255,0.65);
    --break-mute-2: rgba(255,255,255,0.4);
    --break-line:   rgba(255,255,255,0.10);
    --break-accent: #7c9bff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Poppins", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400; color: var(--ink);
    background: var(--bg-2);
    -webkit-font-smoothing: antialiased;
  }
  #root { display: flex; height: 100vh; width: 100vw; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: inherit; font-size: inherit; }
  h1, h2, h3, h4, p { margin: 0; }
  ::selection { background: var(--cobalt-hi); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--mute); }

  /* Interactive row hover */
  .d-row { transition: background 0.1s; }
  .d-row:hover { background: var(--bg-2) !important; }

  /* Input focus */
  .d-input:focus {
    outline: none;
    border-color: var(--cobalt-hi) !important;
    box-shadow: 0 0 0 3px rgba(37,70,184,0.09);
  }

  /* Sidebar nav item hover */
  .nav-item:hover:not(.nav-active) {
    background: rgba(255,255,255,0.06) !important;
    color: #fff !important;
  }

  /* Quick action button hover */
  .qa-btn:hover { background: rgba(255,255,255,0.12) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="dash-data.jsx"></script>
<script type="text/babel" src="dash-layout.jsx"></script>
<script type="text/babel" src="dash-overview.jsx"></script>
<script type="text/babel" src="dash-drivers.jsx"></script>
<script type="text/babel" src="dash-bookings.jsx"></script>
<script type="text/babel" src="dash-app.jsx"></script>
</body>
</html>
